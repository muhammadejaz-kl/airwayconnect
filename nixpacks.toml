[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.bcmath", "php82Extensions.curl", "php82Extensions.gd", "php82Extensions.zip", "php82Extensions.intl", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-zip --ignore-platform-req=ext-gd --ignore-platform-req=ext-imagick"]

[phases.build]
cmds = [
    "npm install",
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
